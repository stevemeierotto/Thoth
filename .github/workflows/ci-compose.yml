# Plan J — CI packaging verification (parallel to native ctest -L pr).
# Builds the engine image, starts CI compose (no GGUF), curls /health.

name: CI Compose Packaging

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: CI packaging smoke (SMOKE_MODE=ci)
        env:
          SMOKE_MODE: ci
          SMOKE_HEALTH_TIMEOUT_SEC: 300
        run: |
          chmod +x docker/smoke.sh
          ./docker/smoke.sh
