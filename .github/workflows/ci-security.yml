name: CI and Security

on:
  push:
    branches: [ main, master ]
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            pkg-config \
            libcurl4-openssl-dev \
            libwxgtk3.2-dev

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset build-debug --parallel

      - name: Run tests
        run: ctest --test-dir build/debug --output-on-failure

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-tidy clang-format

      - name: Install build dependencies for compile database
        run: |
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            pkg-config \
            libcurl4-openssl-dev \
            libwxgtk3.2-dev

      - name: Configure (compile_commands)
        run: cmake -S . -B build-analyze -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=g++ -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-format check
        run: |
          FILES=$(find src includes external/basic_agent/src external/basic_agent/include -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \))
          clang-format --dry-run --Werror $FILES

      - name: Run clang-tidy
        run: |
          FILES=$(find src includes external/basic_agent/src external/basic_agent/include -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \))
          clang-tidy -p build-analyze $FILES

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c++20 \
            --error-exitcode=1 \
            --inline-suppr \
            --quiet \
            external/basic_agent/src \
            external/basic_agent/include \
            src \
            includes

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table

  sanitizer-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            make \
            pkg-config \
            libcurl4-openssl-dev \
            libwxgtk3.2-dev

      - name: Configure ASan
        run: cmake --preset asan

      - name: Build ASan
        run: cmake --build --preset build-asan --parallel

      - name: Run ASan tests
        run: ctest --test-dir build/asan --output-on-failure
